<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Restoration Route | Leaderboard</title>
  <meta name="theme-color" content="#1a1713" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Teko:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --text: #f6f1e7;
      --muted: rgba(255,255,255,0.78);
      --gold: #c89b3c;
      --gold-dark: #a8781f;
      --panel-border: rgba(255,255,255,0.16);
      --panel-bg-a: rgba(84,84,84,0.96);
      --panel-bg-b: rgba(24,24,24,0.98);
      --frame-size: 14px;
    }
    body {
      margin: 0;
      min-height: 100svh;
      font-family: "Rajdhani", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #4a3d2b 0%, #221d18 42%, #101010 100%);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background:
        radial-gradient(260px 150px at 10% 12%, rgba(20,12,8,0.34) 0%, transparent 72%),
        radial-gradient(320px 180px at 90% 16%, rgba(18,12,8,0.28) 0%, transparent 74%),
        repeating-linear-gradient(115deg, rgba(255,255,255,0.025) 0 8px, transparent 8px 32px, rgba(0,0,0,0.04) 32px 36px, transparent 36px 72px);
      mix-blend-mode: screen;
    }
    .page-frame { position: fixed; inset: 0; pointer-events: none; z-index: 30; }
    .page-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(90deg, #121212 0 18px, var(--gold) 18px 36px) top / calc(100% - (var(--frame-size) * 2)) var(--frame-size) no-repeat,
        repeating-linear-gradient(90deg, #121212 0 18px, var(--gold) 18px 36px) bottom / calc(100% - (var(--frame-size) * 2)) var(--frame-size) no-repeat,
        repeating-linear-gradient(0deg, #121212 0 18px, var(--gold) 18px 36px) left / var(--frame-size) calc(100% - (var(--frame-size) * 2)) no-repeat,
        repeating-linear-gradient(0deg, #121212 0 18px, var(--gold) 18px 36px) right / var(--frame-size) calc(100% - (var(--frame-size) * 2)) no-repeat,
        linear-gradient(135deg, #121212 0 50%, var(--gold) 50% 100%) top left / var(--frame-size) var(--frame-size) no-repeat,
        linear-gradient(225deg, #121212 0 50%, var(--gold) 50% 100%) top right / var(--frame-size) var(--frame-size) no-repeat,
        linear-gradient(45deg, #121212 0 50%, var(--gold) 50% 100%) bottom left / var(--frame-size) var(--frame-size) no-repeat,
        linear-gradient(-45deg, #121212 0 50%, var(--gold) 50% 100%) bottom right / var(--frame-size) var(--frame-size) no-repeat;
    }
    .page-frame::after {
      content: "";
      position: absolute;
      inset: 16px;
      background:
        radial-gradient(circle, rgba(200,200,200,0.65) 0 2px, rgba(56,56,56,0.95) 2px 6px, transparent 6px) top left,
        radial-gradient(circle, rgba(200,200,200,0.65) 0 2px, rgba(56,56,56,0.95) 2px 6px, transparent 6px) top right,
        radial-gradient(circle, rgba(200,200,200,0.65) 0 2px, rgba(56,56,56,0.95) 2px 6px, transparent 6px) bottom left,
        radial-gradient(circle, rgba(200,200,200,0.65) 0 2px, rgba(56,56,56,0.95) 2px 6px, transparent 6px) bottom right;
      background-size: 12px 12px;
      background-repeat: no-repeat;
      opacity: 0.88;
    }
    .rotate-prompt {
      position: fixed; inset: 0; z-index: 120; display: none; align-items: center; justify-content: center; padding: 24px;
      background: radial-gradient(circle at top, #4a3d2b 0%, #221d18 42%, #101010 100%);
    }
    .rotate-card {
      width: min(100%, 420px); border-radius: 22px; padding: 24px 22px; text-align: center;
      border: 1px solid rgba(255,255,255,0.16); background: linear-gradient(145deg, rgba(84,84,84,0.96), rgba(24,24,24,0.98));
      box-shadow: 0 18px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -1px 0 rgba(0,0,0,0.35);
    }
    .rotate-icon, .title, .rank-number, .score-number, .button-link, .summary-number { font-family: "Teko", Arial, sans-serif; }
    .rotate-icon { font-size: 52px; line-height: 1; color: #ffe8b0; margin-bottom: 6px; }
    .rotate-title { margin: 0 0 8px; font-family: "Teko", Arial, sans-serif; font-size: 34px; line-height: 1; letter-spacing: 1px; text-transform: uppercase; }
    .rotate-text { margin: 0; color: var(--muted); font-size: 18px; line-height: 1.35; }
    .wrap { min-height: 100svh; padding: 16px; position: relative; z-index: 1; display:flex; align-items:center; justify-content:center; }
    .panel {
      width: min(1180px, 100%);
      height: calc(100svh - 32px);
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      background: linear-gradient(145deg, var(--panel-bg-a), var(--panel-bg-b));
      box-shadow: 0 18px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18), inset 0 -1px 0 rgba(0,0,0,0.35);
      position: relative;
    }
    .panel::before {
      content: "";
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(circle at 18px 18px, rgba(214,214,214,0.75) 0 2px, rgba(62,62,62,0.92) 2px 7px, transparent 7px),
        radial-gradient(circle at calc(100% - 18px) 18px, rgba(214,214,214,0.75) 0 2px, rgba(62,62,62,0.92) 2px 7px, transparent 7px),
        radial-gradient(circle at 18px calc(100% - 18px), rgba(214,214,214,0.75) 0 2px, rgba(62,62,62,0.92) 2px 7px, transparent 7px),
        radial-gradient(circle at calc(100% - 18px) calc(100% - 18px), rgba(214,214,214,0.75) 0 2px, rgba(62,62,62,0.92) 2px 7px, transparent 7px);
      z-index: 1;
    }
    .panel-inner {
      position: relative; z-index: 2; padding: 12px 16px; height: 100%;
      display: grid; grid-template-rows: auto auto auto 1fr; gap: 8px;
    }
    .topbar { display:grid; grid-template-columns: 96px 1fr 96px; align-items:center; gap:10px; }
    .title {
      margin: 0; font-size: clamp(24px, 3vw, 34px); line-height: 0.95; letter-spacing: 1px; text-transform: uppercase; text-align: center;
    }
    .button-link {
      text-decoration: none; color: #f2efe8; background: linear-gradient(180deg, #1d1d1d, #0f0f0f);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 8px 10px; min-width: 0;
      text-align: center; font-size: 18px; line-height: 1; text-transform: uppercase; letter-spacing: 0.8px;
      display: inline-flex; justify-content:center; align-items:center; touch-action: manipulation;
    }
    .spacer { min-height: 1px; }
    .status {
      display:none; padding:10px 12px; border-radius:12px; font-weight:700; backdrop-filter: blur(8px);
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%); z-index: 200; width: min(680px, calc(100vw - 48px));
      pointer-events: none; box-shadow: 0 12px 28px rgba(0,0,0,0.28);
    }
    .status.success { display:block; background: rgba(47,125,50,0.2); border: 1px solid rgba(120,210,130,0.4); color:#dff5e1; }
    .status.error { display:block; background: rgba(178,33,33,0.2); border: 1px solid rgba(255,138,138,0.42); color:#ffdede; }
    .status.info { display:block; background: rgba(60,115,200,0.2); border: 1px solid rgba(145,185,255,0.35); color:#e4efff; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .summary-block {
      border-radius: 14px; padding: 10px; text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.18));
      border: 1px solid rgba(255,255,255,0.12);
      min-height: 0;
    }
    .summary-number { font-size: 28px; line-height: 1; }
    .summary-label { margin-top:4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.72); }
    .leaderboard-list { min-height: 0; display: grid; gap: 6px; align-content: start; overflow: hidden; }
    .leaderboard-row {
      display: grid; grid-template-columns: 52px 1fr 84px; gap: 8px; align-items: center;
      padding: 8px 10px; border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.18));
      border: 1px solid rgba(255,255,255,0.12);
      min-height: 0;
    }
    .leaderboard-row.is-me { border-color: rgba(200,155,60,0.65); box-shadow: 0 0 0 1px rgba(200,155,60,0.2) inset; }
    .rank-number { font-size: 28px; line-height: 1; text-align: center; }
    .player-name { font-size: 18px; line-height: 1.05; font-weight: 700; }
    .player-sub { margin-top: 2px; font-size: 11px; color: rgba(255,255,255,0.66); text-transform: uppercase; letter-spacing: 0.8px; }
    .player-score { text-align: center; }
    .score-number { font-size: 28px; line-height: 1; }
    .score-label { margin-top: 2px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.68); }
    .empty-state {
      border-radius: 14px; padding: 16px; text-align: center; color: var(--muted);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.18));
      border: 1px solid rgba(255,255,255,0.12);
    }
    @media (orientation: portrait) and (max-width: 950px) {
      body.rotate-lock { overflow: hidden; }
      body.rotate-lock .page-frame,
      body.rotate-lock .wrap { display: none; }
      body.rotate-lock .rotate-prompt { display: flex; }
    }
    @media (orientation: landscape) and (max-width: 950px) and (max-height: 560px) {
      .wrap { padding: 10px; }
      .panel { height: calc(100svh - 20px); }
      .panel-inner { padding: 10px; gap: 7px; }
      .topbar { grid-template-columns: 84px 1fr 84px; }
      .title { font-size: clamp(22px, 4vw, 30px); }
      .button-link { padding: 7px 8px; font-size: 15px; border-radius: 10px; }
      .summary-grid { gap: 6px; }
      .summary-block { padding: 8px; }
      .summary-number { font-size: 22px; }
      .summary-label { font-size: 8px; }
      .leaderboard-list { gap: 5px; }
      .leaderboard-row { grid-template-columns: 42px 1fr 72px; gap: 6px; padding: 6px 8px; border-radius: 10px; }
      .rank-number, .score-number { font-size: 22px; }
      .player-name { font-size: 14px; }
      .player-sub, .score-label { font-size: 8px; }
    }
  </style>
</head>
<body class="rotate-lock">
  <div class="page-frame" aria-hidden="true"></div>
  <div id="rotatePrompt" class="rotate-prompt" aria-live="polite">
    <div class="rotate-card">
      <div class="rotate-icon" aria-hidden="true">↻</div>
      <h2 class="rotate-title">Rotate Your Phone</h2>
      <p class="rotate-text">This page works best in landscape. Turn your phone sideways to see the full leaderboard.</p>
    </div>
  </div>
  <div class="wrap">
    <div class="panel">
      <div class="panel-inner">
        <div class="topbar">
          <div class="spacer"></div>
          <h1 class="title">Leaderboard</h1>
          <a class="button-link" href="./index.html">Close</a>
        </div>
        <div id="statusBox" class="status"></div>
        <div class="summary-grid">
          <div class="summary-block">
            <div id="totalNamedPlayers" class="summary-number">0</div>
            <div class="summary-label">Registered Drivers</div>
          </div>
          <div class="summary-block">
            <div id="myPosition" class="summary-number">—</div>
            <div class="summary-label">Your Position</div>
          </div>
          <div class="summary-block">
            <div id="visibleCount" class="summary-number">8</div>
            <div class="summary-label">Top Drivers Shown</div>
          </div>
        </div>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </div>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBSSekdM7t9zc_ee0kQ5xSBFYNvRN53PV0",
      authDomain: "the-restoration-route.firebaseapp.com",
      projectId: "the-restoration-route",
      storageBucket: "the-restoration-route.firebasestorage.app",
      messagingSenderId: "878380399095",
      appId: "1:878380399095:web:6a16f26fedce5f1f9c96f2",
      measurementId: "G-0PLZQ6B8HT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusBox = document.getElementById("statusBox");
    const leaderboardList = document.getElementById("leaderboardList");
    const totalNamedPlayers = document.getElementById("totalNamedPlayers");
    const myPosition = document.getElementById("myPosition");
    const visibleCount = document.getElementById("visibleCount");

    let currentUid = null;
    let statusTimer = null;

    function showStatus(message, type = "info", autoHideMs = 4000) {
      if (statusTimer) clearTimeout(statusTimer);
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
      if (autoHideMs > 0) {
        statusTimer = window.setTimeout(clearStatus, autoHideMs);
      }
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    async function loadLeaderboard() {
      clearStatus();
      try {
        const q = query(collection(db, "leaderboard"), orderBy("completedVehicles", "desc"), limit(100));
        const snap = await getDocs(q);
        const rows = snap.docs
          .map((docSnap) => {
            const data = docSnap.data();
            return {
              uid: docSnap.id,
              username: typeof data.username === "string" ? data.username : "",
              completedVehicles: Number.isFinite(data.completedVehicles) ? data.completedVehicles : 0,
              isRegistered: data.isRegistered === true
            };
          })
          .filter((row) => row.isRegistered && row.username);

        rows.sort((a, b) => {
          if (b.completedVehicles !== a.completedVehicles) return b.completedVehicles - a.completedVehicles;
          return a.username.localeCompare(b.username);
        });

        totalNamedPlayers.textContent = String(rows.length);
        const myIndex = rows.findIndex((row) => row.uid === currentUid);
        myPosition.textContent = myIndex >= 0 ? String(myIndex + 1) : "—";

        const visibleRows = rows.slice(0, 8);
        visibleCount.textContent = String(visibleRows.length || 0);

        if (!visibleRows.length) {
          leaderboardList.innerHTML = `<div class="empty-state">No named users are on the board yet.</div>`;
          return;
        }

        leaderboardList.innerHTML = visibleRows.map((row, index) => `
          <div class="leaderboard-row ${row.uid === currentUid ? "is-me" : ""}">
            <div class="rank-number">#${index + 1}</div>
            <div>
              <div class="player-name">${escapeHtml(row.username)}</div>
              <div class="player-sub">${row.uid === currentUid ? "You" : "Registered Driver"}</div>
            </div>
            <div class="player-score">
              <div class="score-number">${row.completedVehicles}</div>
              <div class="score-label">Vehicles</div>
            </div>
          </div>
        `).join("");
      } catch (error) {
        leaderboardList.innerHTML = "";
        showStatus(error.message || "Could not load the leaderboard.", "error");
      }
    }

    onAuthStateChanged(auth, async (user) => {
      currentUid = user?.uid || null;
      await loadLeaderboard();
    });
  </script>
</body>
</html>
