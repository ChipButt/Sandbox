<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Racer Host Example</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0e1620; color: #fff; }
    .screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .menu { text-align: center; }
    button { padding: 12px 18px; border-radius: 12px; border: 0; cursor: pointer; font-size: 16px; }
    #gameWrap { position: fixed; inset: 0; display: none; background: #000; }
    iframe { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body>
  <div class="screen menu" id="menu">
    <div>
      <h1>Main App Menu</h1>
      <button id="launchBtn">Launch arcade racer</button>
      <p id="result"></p>
    </div>
  </div>

  <div id="gameWrap">
    <iframe id="gameFrame" src="./arcade-racer/index.html"></iframe>
  </div>

  <script>
    const launchBtn = document.getElementById('launchBtn');
    const menu = document.getElementById('menu');
    const gameWrap = document.getElementById('gameWrap');
    const result = document.getElementById('result');
    const frame = document.getElementById('gameFrame');

    launchBtn.addEventListener('click', () => {
      menu.style.display = 'none';
      gameWrap.style.display = 'block';
      frame.src = './arcade-racer/index.html';
    });

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data || data.source !== 'arcade-racer') return;

      if (data.type === 'exit') {
        gameWrap.style.display = 'none';
        menu.style.display = 'flex';
        result.textContent = data.reason === 'win'
          ? 'Player finished the mini-game.'
          : 'Player quit the mini-game.';
      }
    });
  </script>
</body>
</html>
