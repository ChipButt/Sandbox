<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" role="img" aria-labelledby="title desc">
  <title id="title">Illustrated pirate map of Bidford-on-Avon</title>
  <desc id="desc">A stylised map showing River Avon, bridge, church, High Street, Big Meadow, walking route, and six clue locations.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5dfaa"/>
      <stop offset=".5" stop-color="#d0a05f"/>
      <stop offset="1" stop-color="#a46d38"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2e8194"/>
      <stop offset=".5" stop-color="#61b4bc"/>
      <stop offset="1" stop-color="#24667c"/>
    </linearGradient>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency=".015" numOctaves="3" seed="4"/>
      <feColorMatrix type="saturate" values=".18"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
